services:
  app:
    build: .
    container_name: iscan-app
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - app_arsip:/app/Gudang_Arsip_Excel
      - app_handover:/app/Handover_Reports
      - app_sales:/app/Sales_Reports
      - app_videos:/app/Packing_Videos
      - app_db_backup:/app/DB_Backup
      - app_static:/app/static
    networks:
      - iscan_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:stable-alpine
    container_name: iscan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - app_static:/app/static:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - iscan_net

networks:
  iscan_net:
    driver: bridge

volumes:
  app_data:
  app_logs:
  app_arsip:
  app_handover:
  app_sales:
  app_videos:
  app_db_backup:
  app_static:
