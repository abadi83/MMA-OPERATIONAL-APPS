worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on; keepalive_timeout 65;
    gzip on; gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
    client_max_body_size 200M;

    upstream backend { server app:8501; keepalive 64; }

    server {
        listen 80;
        server_name mma-ops.online www.mma-ops.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name mma-ops.online www.mma-ops.online;
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        add_header X-Frame-Options SAMEORIGIN always;

        location /app/static/ { alias /app/static/; expires 30d; add_header Cache-Control "public, immutable"; }
        location /health { proxy_pass http://backend/_stcore/health; proxy_http_version 1.1; proxy_set_header Host $host; access_log off; }

        location / {
            proxy_set_header Accept-Encoding "";
            sub_filter_once on; sub_filter_types text/html;
            sub_filter '</head>' '<script src="/app/static/auth-persist.js"></script></head>';
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
    }
}
