worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on; keepalive_timeout 65;
    gzip on; gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
    client_max_body_size 200M;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name mma-ops.online www.mma-ops.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name mma-ops.online www.mma-ops.online;
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        add_header X-Frame-Options SAMEORIGIN always;

        location /app/static/ { alias /app/static/; expires 30d; add_header Cache-Control "public, immutable"; }
        location /health { proxy_pass http://app:8501/_stcore/health; proxy_http_version 1.1; proxy_set_header Host $host; access_log off; }

        location / {
            proxy_set_header Accept-Encoding "";
            sub_filter_once on; sub_filter_types text/html;
            sub_filter '</head>'
            '<link rel="manifest" href="/app/static/manifest.json" crossorigin="use-credentials">
            <meta name="theme-color" content="#0A84FF">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
            <meta name="apple-mobile-web-app-title" content="iScan Pro">
            <meta name="application-name" content="iScan Pro By MMA">
            <link rel="apple-touch-icon" href="/app/static/icon-192.png">
            <script src="/app/static/auth-persist.js"></script>
            <script src="/app/static/pwa-init.js"></script>
            </head>';
            set $backend "app:8501";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
    }
}
