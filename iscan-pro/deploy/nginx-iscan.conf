# ══════════════════════════════════════════════════════
# iScan Pro By MMA — Nginx Reverse Proxy (VPS)
# ══════════════════════════════════════════════════════
#
# Install:
#   sudo cp deploy/nginx-iscan.conf /etc/nginx/sites-available/iscan
#   sudo ln -s /etc/nginx/sites-available/iscan /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d iscan.mitra-mulia-abadi.com
#

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name iscan.mitra-mulia-abadi.com;  # ← GANTI dengan domain VPS kamu

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iscan.mitra-mulia-abadi.com;  # ← GANTI dengan domain VPS kamu

    # ── SSL (Certbot akan mengisi ini otomatis) ──
    ssl_certificate /etc/letsencrypt/live/iscan.mitra-mulia-abadi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iscan.mitra-mulia-abadi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Client max body (upload Excel) ──
    client_max_body_size 200M;

    # ── Proxy to Streamlit ──
    location / {
        # Disable upstream compression so sub_filter can modify HTML
        proxy_set_header Accept-Encoding "";

        # PWA injection via sub_filter — inserts manifest + meta tags into <head>
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>'
    '<link rel="manifest" href="/app/static/manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#0A84FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="iScan Pro">
    <meta name="application-name" content="iScan Pro By MMA">
    <link rel="apple-touch-icon" href="/app/static/icon-192.png">
    <script src="/app/static/auth-persist.js"></script>
    <script src="/app/static/pwa-init.js"></script>
    </head>';

        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket support (Streamlit requires this!)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # Disable buffering for Streamlit streaming
        proxy_buffering off;
    }

    # ── Static files (PWA: manifest, icons, sw.js) ──
    location /app/static/ {
        alias /opt/iscan-pro/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Health check ──
    location /healthz {
        proxy_pass http://127.0.0.1:8501/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
