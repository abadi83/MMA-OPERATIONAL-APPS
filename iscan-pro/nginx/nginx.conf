# ═══════════════════════════════════════════════
# iScan Pro — Nginx for Docker
# ═══════════════════════════════════════════════
# PWA injection via sub_filter + reverse proxy ke Streamlit.
# WebSocket support untuk Streamlit real-time connection.
# ═══════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 200M;

    # ── Upstream: Streamlit app ──
    upstream streamlit_backend {
        server app:8501;
        keepalive 64;
    }

    # ── HTTP Server ──
    server {
        listen 80;
        server_name _;

        # ── Security headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Static PWA assets ──
        location /app/static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Streamlit App (with PWA injection) ──
        location / {
            # Disable upstream compression so sub_filter can modify HTML
            proxy_set_header Accept-Encoding "";

            # ── PWA Injection via sub_filter ──
            sub_filter_once on;
            sub_filter_types text/html;
            sub_filter '</head>'
    '<link rel="manifest" href="/app/static/manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#0A84FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="iScan Pro">
    <meta name="application-name" content="iScan Pro By MMA">
    <link rel="apple-touch-icon" href="/app/static/icon-192.png">
    <script src="/app/static/auth-persist.js"></script>
    <script src="/app/static/pwa-init.js"></script>
    </head>';

            # ── Proxy to Streamlit ──
            proxy_pass http://streamlit_backend;
            proxy_http_version 1.1;

            # WebSocket support (Streamlit requires this!)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;

            # Disable buffering for Streamlit streaming
            proxy_buffering off;
        }

        # ── Health check ──
        location /health {
            proxy_pass http://streamlit_backend/_stcore/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
