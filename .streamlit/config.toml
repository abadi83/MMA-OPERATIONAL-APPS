[server]
address = "0.0.0.0"
port = 8501
enableStaticServing = true
headless = true
maxUploadSize = 200
maxMessageSize = 500
enableCORS = true
enableXsrfProtection = false
fileWatcherType = "poll"
runOnSave = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
base = "dark"
primaryColor = "#0A84FF"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#1C1C1E"
textColor = "#FFFFFF"
font = "sans serif"

[logger]
level = "info"
messageFormat = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

[theme]
base = "dark"
primaryColor = "#0A84FF"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#1C1C1E"
textColor = "#FFFFFF"
font = "sans serif"
